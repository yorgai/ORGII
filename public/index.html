<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORG2</title>
    <!-- Preflight: same radii as src/config/windowChromeRadius.ts (splash before bundle loads) -->
    <script>
      (function () {
        var styleNonce = "orgii-codemirror-style";
        var originalCreateElement = document.createElement.bind(document);
        document.createElement = function (tagName, options) {
          var element = originalCreateElement(tagName, options);
          if (String(tagName).toLowerCase() === "style") {
            element.setAttribute("nonce", styleNonce);
          }
          return element;
        };
      })();
    </script>
    <script>
      // Hide splash immediately for secondary windows (/windows/*).
      // These are lightweight Tauri panels — no loading screen needed.
      if (window.location.pathname.indexOf("/windows/") === 0) {
        document.addEventListener("DOMContentLoaded", function () {
          var s = document.getElementById("splash");
          if (s) s.style.display = "none";
        });
        // Also hide before DOMContentLoaded in case it fires too late
        document.documentElement.dataset.noSplash = "1";
        var storedTheme = localStorage.getItem("theme") || "github-light";
        var isDarkTheme = /dark|abyss|tomorrowNightBlue|orgii_dark/.test(storedTheme);
        document.documentElement.dataset.preflightTheme = isDarkTheme ? "dark" : "light";
      }
    </script>
    <script>
      (function () {
        var ua = (navigator.userAgent || "").toLowerCase();
        var html = document.documentElement;
        var winVal, pageVal;
        if (ua.indexOf("windows") !== -1) {
          winVal = "8px"; pageVal = "8px";
          html.dataset.hostDesktop = "windows";
        } else if (ua.indexOf("linux") !== -1 && ua.indexOf("android") === -1) {
          winVal = "12px"; pageVal = "12px";
          html.dataset.hostDesktop = "linux";
        } else {
          html.dataset.hostDesktop = "macos";
        }
        if (winVal) {
          html.style.setProperty("--border-radius-window", winVal);
          html.style.setProperty("--radius-page", pageVal);
        }
      })();
    </script>
    <script>
      // ---------------------------------------------------------------------
      // Splash hard-timeout watchdog (runs before the JS bundle).
      //
      // The splash (#splash) is normally removed only when React commits its
      // first paint. If the bundle fails to parse/execute, hangs, or enters an
      // infinite chunk-reload loop, that signal never arrives and the user is
      // stranded on the logo forever. This watchdog is fully self-contained
      // (no bundle dependency) so it fires even when nothing else runs.
      //
      // It exposes window.__ORGII_SPLASH_DONE__(): the React first-paint path
      // (and the reload circuit-breaker) call it to cancel the watchdog once
      // the app is alive. Whichever happens first wins.
      // ---------------------------------------------------------------------
      (function () {
        // Secondary windows (/windows/*) never show the splash.
        if (window.location.pathname.indexOf("/windows/") === 0) {
          window.__ORGII_SPLASH_DONE__ = function () {};
          return;
        }

        // Default 20s. An E2E/test harness may shorten this by setting
        // window.__ORGII_WATCHDOG_MS_OVERRIDE__ before the bundle runs; the
        // override only ever shortens the wait and never ships in normal use.
        var WATCHDOG_MS =
          typeof window.__ORGII_WATCHDOG_MS_OVERRIDE__ === "number"
            ? window.__ORGII_WATCHDOG_MS_OVERRIDE__
            : 20000;
        var settled = false;

        function showStartupError(force) {
          if (settled && !force) return;
          var splash = document.getElementById("splash");
          if (!splash || splash.style.display === "none") return;
          // Replace splash content in place with an actionable panel.
          splash.innerHTML =
            '<div style="display:flex;flex-direction:column;align-items:center;gap:20px;max-width:420px;text-align:center;padding:32px;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',Roboto,sans-serif">' +
            '<div style="font-size:44px">⏳</div>' +
            '<div style="color:#fff;font-size:17px;font-weight:600">Startup is taking too long</div>' +
            '<div style="color:#9ca3af;font-size:13px;line-height:1.6">The app could not finish loading. This is usually a one-off — try reloading. If it keeps happening, quit and reopen, or check the logs at <span style="color:#d1d5db">~/.orgii/logs/</span>.</div>' +
            '<div style="display:flex;gap:12px;margin-top:4px">' +
            '<button id="orgii-splash-reload" style="background:#3b82f6;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer">Reload</button>' +
            '<button id="orgii-splash-clear" style="background:transparent;color:#9ca3af;border:1px solid #374151;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer">Clear data &amp; reload</button>' +
            "</div></div>";
          var reloadBtn = document.getElementById("orgii-splash-reload");
          if (reloadBtn) {
            reloadBtn.onclick = function () {
              try {
                sessionStorage.removeItem("orgii:chunk-reload-count");
              } catch (e) {}
              window.location.reload();
            };
          }
          var clearBtn = document.getElementById("orgii-splash-clear");
          if (clearBtn) {
            clearBtn.onclick = function () {
              try {
                localStorage.clear();
                sessionStorage.clear();
              } catch (e) {}
              window.location.reload();
            };
          }
        }

        var timerId = setTimeout(showStartupError, WATCHDOG_MS);

        // Called by the React first-paint path once the app is alive, and by
        // the reload circuit-breaker when it takes over the splash itself.
        window.__ORGII_SPLASH_DONE__ = function () {
          settled = true;
          clearTimeout(timerId);
        };

        // Expose the panel so the bundle's circuit-breakers can reuse it.
        window.__ORGII_SHOW_STARTUP_ERROR__ = showStartupError;
      })();
    </script>
    <style nonce="orgii-codemirror-style">
      :root {
        --border-radius-window: 26px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        /* Prevent WebKit tap highlight that can interfere with hover states */
        -webkit-tap-highlight-color: transparent;
      }
      /*
       * Re-enable text selection on text-input surfaces. The global
       * `* { user-select: none }` above otherwise disables Cmd+A /
       * Ctrl+A inside <input>, <textarea>, and contenteditable
       * surfaces across the whole app. This preflight rule keeps
       * selectAll working during the splash window before the main
       * stylesheet's matching block (in src/index.scss) loads.
       */
      input,
      textarea,
      select,
      [contenteditable=""],
      [contenteditable="true"],
      [contenteditable="plaintext-only"] {
        user-select: text !important;
        -webkit-user-select: text !important;
      }
      html, body, #root {
        height: 100%;
        background: #0d0d0d;
        border-radius: var(--border-radius-window);
        overflow: hidden;
      }
      [data-no-splash="1"][data-preflight-theme="light"],
      [data-no-splash="1"][data-preflight-theme="light"] body,
      [data-no-splash="1"][data-preflight-theme="light"] #root {
        background: #ffffff;
      }
      [data-no-splash="1"][data-preflight-theme="dark"],
      [data-no-splash="1"][data-preflight-theme="dark"] body,
      [data-no-splash="1"][data-preflight-theme="dark"] #root {
        background: #0d0d0d;
      }
      /* Remove border radius in fullscreen mode */
      html.fullscreen,
      html.fullscreen body,
      html.fullscreen #root,
      html.fullscreen #splash {
        border-radius: 0 !important;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0d0d;
        border-radius: var(--border-radius-window);
        z-index: 99999;
        transition: opacity 0.2s ease-out;
      }
      /* Secondary windows (/windows/*) never show the splash */
      [data-no-splash="1"] #splash {
        display: none !important;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-logo {
        width: 240px;
        height: 240px;
        filter: drop-shadow(0 18px 40px rgba(255, 255, 255, 0.12));
        pointer-events: none;
      }
      #splash-text {
        position: absolute;
        bottom: 24px;
        left: 0;
        right: 0;
        text-align: center;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.5px;
      }
      #splash-text .dots {
        display: inline-block;
        width: 18px;
        text-align: left;
      }
      @keyframes dots {
        0%, 20% { content: "."; }
        40% { content: ".."; }
        60%, 100% { content: "..."; }
      }
      #splash-text .dots::after {
        content: ".";
        animation: dots 1.5s steps(1) infinite;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg
        id="splash-logo"
        viewBox="0 0 1024 1024"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"

        aria-label="ORG2"
      >

      <div id="splash-text">Initializing<span class="dots"></span></div>
    </div>
    <div id="root"></div>
  </body>
</html>
