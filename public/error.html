<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORG2 - Unexpected Error</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        color: #333;
      }
      
      .window-container {
        position: fixed;
        inset: 0;
        background-color: #f5f5f5;
        border-radius: 26px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        pointer-events: auto;
      }
      
      .title-bar {
        height: 36px;
        flex-shrink: 0;
        background-color: #e5e5e5;
        -webkit-app-region: drag;
      }
      
      .content-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: no-drag;
      }
      
      .error-container {
        text-align: center;
        max-width: 500px;
        padding: 2rem;
      }
      
      .error-icon {
        width: 200px;
        height: 200px;
        margin: 0 auto 2rem;
        border-radius: 50%;
        background: linear-gradient(to bottom, #8DC1FF, transparent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
      }
      
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #374151;
        margin-bottom: 1rem;
      }
      
      p {
        color: #6b7280;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      
      .buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      
      button {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        -webkit-app-region: no-drag;
        user-select: none;
      }
      
      .primary-btn {
        background-color: #3b82f6;
        color: white;
      }
      
      .primary-btn:hover {
        background-color: #2563eb;
      }
      
      .secondary-btn {
        background-color: white;
        color: #374151;
        border: 1px solid #d1d5db;
      }
      
      .secondary-btn:hover {
        background-color: #f9fafb;
      }
      
      .note {
        margin-top: 2rem;
        font-size: 0.875rem;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="window-container">
      <div class="title-bar" data-tauri-drag-region></div>
      <div class="content-area">
        <div class="error-container">
          <div class="error-icon">😵</div>
          <h1>Oops! Something went wrong</h1>
          <p>
            The application encountered an unexpected error. Please refresh the page.
          </p>
          <div class="buttons">
            <button class="primary-btn" type="button">
              Refresh
            </button>
          </div>
          <div class="note">
            If this problem persists, please check the browser console for more details.
          </div>
        </div>
      </div>
    </div>

    <script>
      function refreshPage() {
        console.log('[ErrorPage HTML] Refresh clicked');
        try {
          // Check if running in Tauri
          var isTauri = window.__TAURI__ !== undefined;
          console.log('[ErrorPage HTML] Is Tauri:', isTauri);
          
          if (isTauri) {
            // In Tauri, use location.assign instead of reload
            window.location.assign(window.location.origin);
          } else {
            window.location.reload();
          }
        } catch (e) {
          console.error('[ErrorPage HTML] Refresh failed:', e);
          // Fallback: navigate to origin
          window.location.href = window.location.origin;
        }
      }
      
      // Add click listener as backup
      document.addEventListener('DOMContentLoaded', function() {
        var btn = document.querySelector('.primary-btn');
        if (btn) {
          btn.addEventListener('click', function(e) {
            console.log('[ErrorPage HTML] Button click event fired');
            e.preventDefault();
            e.stopPropagation();
            refreshPage();
          });
        }
      });
      
      document.addEventListener('keydown', function(event) {
        if ((event.key === 'r' || event.key === 'R') && !event.metaKey && !event.ctrlKey) {
          refreshPage();
        }
      });
    </script>
  </body>
</html>
