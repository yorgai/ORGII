name: Rust Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "src-tauri/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "src-tauri/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Check code compiles
        working-directory: src-tauri
        run: cargo check --lib

      - name: Run unit tests (by module)
        working-directory: src-tauri
        run: |
          echo "Running tests with new organized structure..."
          # Run tests for core modules
          cargo test --lib agent_core:: --no-fail-fast
          cargo test --lib event_store:: --no-fail-fast
          cargo test --lib human_tools:: --no-fail-fast
          cargo test --lib agent_variants:: --no-fail-fast
          cargo test --lib tool_service:: --no-fail-fast
          
          # Run tests for other modules
          cargo test --lib orchestrator:: --no-fail-fast
          cargo test --lib api:: --no-fail-fast
          cargo test --lib git:: --no-fail-fast
          cargo test --lib session:: --no-fail-fast
          cargo test --lib validation:: --no-fail-fast

      - name: Run integration tests
        working-directory: src-tauri
        run: cargo test --test "*" --no-fail-fast 2>&1 || echo "Integration tests completed with warnings"

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings 2>&1 || true

      - name: Generate test coverage (if available)
        working-directory: src-tauri
        run: |
          if command -v cargo-tarpaulin &> /dev/null; then
            cargo tarpaulin --out xml --skip-clean --timeout 300
          else
            echo "Tarpaulin not available, skipping coverage"
          fi
        continue-on-error: true
