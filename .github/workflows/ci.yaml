# Run on every push and PR to main.
# Checks: ESLint, TypeScript, Rust clippy + cargo check.

name: "CI"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  frontend:
    name: Frontend (ESLint + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: pnpm exec tsc --noEmit

  rust:
    name: Rust (clippy + cargo check)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "ci-macos-aarch64"

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --target aarch64-apple-darwin

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --target aarch64-apple-darwin -- -D warnings
