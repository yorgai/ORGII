# Build, sign, notarize, and release ORGII for macOS (Apple Silicon).
#
# Trigger: push a tag matching v* (e.g. v0.2.0, v0.2.0-rc.1)
#
# Required GitHub Secrets:
#   APPLE_CERTIFICATE               — base64-encoded .p12 Developer ID certificate
#   APPLE_CERTIFICATE_PASSWORD      — password for the .p12
#   APPLE_SIGNING_IDENTITY          — e.g. "Developer ID Application: ORGII AI Inc (XXXXXXXXXX)"
#   APPLE_ID                        — Apple account email for notarization
#   APPLE_PASSWORD                  — app-specific password for notarization
#   APPLE_TEAM_ID                   — 10-char Apple Team ID
#   TAURI_SIGNING_PRIVATE_KEY       — Tauri updater ed25519 private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password for the updater key

name: "Release ORGII (macOS)"

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create releases and upload assets

jobs:
  build-and-release:
    name: Build & Release (macOS aarch64)
    runs-on: self-hosted
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: .

      # ── Use local node_modules from repo ──────────────────────
      - name: Link local node_modules
        run: |
          if [ -n "$LOCAL_REPO_PATH" ] && [ -d "$LOCAL_REPO_PATH/node_modules" ] && [ ! -d "node_modules" ]; then
            ln -s "$LOCAL_REPO_PATH/node_modules" node_modules
            echo "Linked node_modules from $LOCAL_REPO_PATH"
          else
            echo "node_modules already present or LOCAL_REPO_PATH not set"
          fi

      # ── Apple code-signing certificate (fail fast before slow steps) ─
      - name: Import Apple certificate
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          printf '%s' "$APPLE_CERTIFICATE" | base64 -d > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # ── Stamp version from git tag ──────────────────────────
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"  # v0.2.0-rc.1 → 0.2.0-rc.1
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "=== Release version: $VERSION ==="

          # Patch tauri.conf.json
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json

          # Patch package.json
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json

          # Verify
          grep '"version"' src-tauri/tauri.conf.json package.json

      # ── Node.js + pnpm ───────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install frontend dependencies
        run: |
          if [ -L "node_modules" ]; then
            echo "node_modules symlinked from local repo, skipping install"
          elif [ -f "node_modules/.modules.yaml" ]; then
            echo "node_modules restored from cache, skipping install"
          else
            pnpm install --frozen-lockfile
          fi

      # ── Rust ──────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "release-macos-aarch64" # shared across all tag refs

      # ── Download sidecar binaries (peekaboo, agent-browser) ──
      - name: Cache sidecar binaries
        uses: actions/cache@v5
        with:
          path: src-tauri/bin
          key: sidecars-peekaboo-v3.2.3-agent-browser-v0.27.2-macos

      - name: Download sidecar binaries
        run: python3 scripts/tools/download_sidecars.py

      # ── Pre-sign sidecar binaries before Tauri copies them ──────
      - name: Pre-sign sidecar binaries
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          SIDECAR_ENTITLEMENTS="src-tauri/sidecar-entitlements.plist"

          # dugite git binaries — hardened runtime + timestamp
          echo "Pre-signing dugite git binaries..."
          find "node_modules/dugite/git" -type f | while read -r bin; do
            if file "$bin" | grep -qE "Mach-O|executable|dylib|bundle"; then
              codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
                --options runtime --timestamp \
                "$bin" 2>/dev/null && echo "Signed: $bin" || echo "Skipped: $bin"
            fi
          done

          # sidecar binaries (peekaboo, agent-browser) — use sidecar entitlements
          # to ensure get-task-allow is NOT present
          echo "Pre-signing sidecar binaries..."
          for bin in src-tauri/bin/peekaboo \
                     src-tauri/bin/peekaboo-aarch64-apple-darwin \
                     src-tauri/bin/peekaboo-x86_64-apple-darwin \
                     src-tauri/bin/agent-browser-aarch64-apple-darwin; do
            if [ -f "$bin" ] && file "$bin" | grep -qE "Mach-O|executable"; then
              codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
                --options runtime --timestamp \
                --entitlements "$SIDECAR_ENTITLEMENTS" \
                "$bin" && echo "Signed: $bin" || echo "Failed: $bin"
            fi
          done
          echo "Done pre-signing sidecar binaries"

      # ── Build Tauri app (sign + notarize + updater artifacts) ─
      - name: Build ORGII
        env:
          # Apple signing & notarization (Tauri reads these automatically)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # Semantic search archived; no extra `--features` needed.
        run: pnpm tauri build --target aarch64-apple-darwin

      # ── Re-sign sidecar binaries inside the assembled .app ──────
      # Tauri calls codesign on the whole bundle, but it doesn't re-sign
      # nested Resources/bin/* with hardened runtime. We do it here so
      # Apple's notarization service sees the correct signatures.
      - name: Re-sign sidecar binaries in .app bundle
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/ORGII.app"
          SIDECAR_ENTITLEMENTS="src-tauri/sidecar-entitlements.plist"
          RESOURCES_BIN="$APP/Contents/Resources/bin"

          if [ ! -d "$APP" ]; then
            echo "No .app bundle found, skipping"
            exit 0
          fi

          echo "Re-signing sidecar binaries in $RESOURCES_BIN ..."
          for bin in peekaboo peekaboo-aarch64-apple-darwin peekaboo-x86_64-apple-darwin \
                     agent-browser-aarch64-apple-darwin; do
            target="$RESOURCES_BIN/$bin"
            if [ -f "$target" ] && file "$target" | grep -qE "Mach-O|executable"; then
              codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
                --options runtime --timestamp \
                --entitlements "$SIDECAR_ENTITLEMENTS" \
                "$target" && echo "Re-signed: $target" || echo "Failed: $target"
            fi
          done

          # Re-sign the whole bundle to include the updated nested signatures
          echo "Re-signing the top-level .app bundle..."
          codesign --force --deep --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime --timestamp \
            --entitlements "src-tauri/entitlements.plist" \
            "$APP"
          echo "Bundle re-sign complete"

      # ── Locate build artifacts ────────────────────────────────
      - name: Gather release artifacts
        id: artifacts
        run: |
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"

          # .dmg installer
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

          # Updater: .app.tar.gz and .app.tar.gz.sig
          UPDATER_TAR=$(find "$BUNDLE_DIR/macos" -name "*.app.tar.gz" ! -name "*.sig" | head -1)
          UPDATER_SIG=$(find "$BUNDLE_DIR/macos" -name "*.app.tar.gz.sig" | head -1)
          echo "updater_tar=$UPDATER_TAR" >> "$GITHUB_OUTPUT"
          echo "updater_sig=$UPDATER_SIG" >> "$GITHUB_OUTPUT"
          echo "updater_tar_name=$(basename "$UPDATER_TAR")" >> "$GITHUB_OUTPUT"
          echo "updater_sig_name=$(basename "$UPDATER_SIG")" >> "$GITHUB_OUTPUT"

          echo "=== Release artifacts ==="
          echo "DMG:         $DMG"
          echo "Updater tar: $UPDATER_TAR"
          echo "Updater sig: $UPDATER_SIG"

      # ── Generate updater manifest (latest.json) ───────────────
      - name: Generate latest.json for updater
        env:
          TAG: ${{ github.ref_name }}
        run: |
          SIGNATURE=$(cat "${{ steps.artifacts.outputs.updater_sig }}")
          TAR_NAME="${{ steps.artifacts.outputs.updater_tar_name }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${TAR_NAME}"

          jq -n \
            --arg version "${TAG#v}" \
            --arg notes "Release ${TAG}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg signature "$SIGNATURE" \
            --arg url "$DOWNLOAD_URL" \
            '{ version: $version, notes: $notes, pub_date: $pub_date, platforms: { "darwin-aarch64": { signature: $signature, url: $url } } }' \
            > latest.json

          echo "=== latest.json ==="
          cat latest.json

      # ── Create GitHub Release ─────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-nightly') }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.updater_tar }}
            ${{ steps.artifacts.outputs.updater_sig }}
            latest.json

      # ── Cleanup keychain (only if certificate was imported) ────
      - name: Cleanup keychain
        if: always() && env.HAS_APPLE_CERT == 'true'
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
