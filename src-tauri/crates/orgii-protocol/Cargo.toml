[package]
name = "orgii_protocol"
version = "0.1.0"
edition = "2021"
rust-version = "1.85.0"
description = "Wire protocol shared between the ORGII desktop bridge, mobile relay, and PWA. Pure data, zero behavior, no Tauri / no IO."
publish = false

[lib]
name = "orgii_protocol"
path = "src/lib.rs"

# Like `core_types`, this crate sits at the bottom of the workspace dep
# graph. Both the desktop `mobile_remote` module and the standalone
# `orgii-mobile-relay` binary depend on it, so it MUST stay free of
# behavior deps (tokio, reqwest, tauri, sqlx, ...). Adding such deps
# would force every consumer to pull them in, defeating the point of
# splitting the relay into its own optional crate.
[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
