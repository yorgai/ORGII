[package]
name = "perf_utils"
version = "0.1.0"
edition = "2021"
publish = false

# Performance-critical leaf utilities (image luminance, binary detection,
# fast JSON, hashing, diff/patch, process metrics). Pure leaf — no
# back-edges into `app`. Owns ~36 `#[tauri::command]`s, re-registered
# from `commands/handler_list.inc` via bare `perf_utils::…` paths.

[lib]
path = "src/lib.rs"

[dependencies]
app_platform = { path = "../app-platform" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
tauri = { workspace = true }
tokio = { workspace = true }
tracing = "0.1"
log = "0.4"
base64 = { workspace = true }

# Hashing
sha2 = "0.10"
hex = "0.4"
blake3 = "1.5"

# Binary detection
infer = "0.19"
memchr = "2.7"

# Fast JSON
simd-json = "0.17"

# Image luminance
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
rayon = "1.8"

# Diff / patch
similar = "2.6"

# Process metrics
sysinfo = { workspace = true }
