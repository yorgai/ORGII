[package]
name = "ui_indexer"
version = "0.1.0"
edition = "2021"

[lib]
name = "ui_indexer"
path = "src/lib.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tauri = { workspace = true }
tokio = { workspace = true }
log = "0.4"
regex = "1.9.5"
ignore = "0.4"
rayon = "1.8"
tree-sitter = "0.25"
tree-sitter-typescript = "0.23"

[dev-dependencies]
app_utils = { path = "../app-utils", features = ["testing"] }
