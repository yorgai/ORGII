[package]
name = "search"
version = "0.1.0"
edition = "2021"

[lib]
name = "search"
path = "src/lib.rs"

[dependencies]
app_paths = { path = "../app-paths" }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { workspace = true }
tokio = { workspace = true }
tracing = "0.1"
anyhow = "1.0"
regex = "1.9.5"
ignore = "0.4"
rayon = "1.8"
scopeguard = "1.2"
crossbeam-channel = "0.5"

# File-name fuzzy matcher (same one Helix uses).
nucleo-matcher = "0.3"

# Memory-mapped ripgrep core for streaming text search across files.
grep-searcher = "0.1"
grep-regex = "0.1"

# LRU cache for keyword/regex search result memoization.
lru = "0.12"

# Tree-sitter for symbol indexing (TS, JS, Python, Rust grammars).
tree-sitter = "0.24"
tree-sitter-javascript = "0.23"
tree-sitter-python = "0.23"
tree-sitter-rust = "0.23"
tree-sitter-typescript = "0.23"
streaming-iterator = "0.1"
petgraph = { workspace = true }

# Workspace cache: blake3 hashes per file in the merkle tree, plus fs_extra
# for atomic snapshot-file replacement.
blake3 = "1.5"
fs_extra = "1.3"

[dev-dependencies]
app_utils = { path = "../app-utils", features = ["testing"] }
