[package]
name = "transport"
version = "0.1.0"
edition = "2021"
publish = false

# Cross-platform event emitter abstraction (Tauri + Mock adapters,
# `TransportEmitter` global for agent/tool/text-chunk events). Pure leaf —
# no back-edges into `app`. The `app` crate consumes this only at startup
# to install the global emitter from `lib::run()`. Inspired by BitFun's
# transport layer design.

[lib]
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
tauri = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
