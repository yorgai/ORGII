[package]
name = "orgii_mobile_relay"
version = "0.1.0"
edition = "2021"
rust-version = "1.85.0"
description = "ORGII mobile remote control relay server. Routes RPC frames between paired desktop and mobile peers."
publish = false

[lib]
name = "orgii_mobile_relay"
path = "src/lib.rs"

[[bin]]
name = "orgii-mobile-relay"
path = "src/bin/main.rs"

# This crate stays optional behind a feature flag so users who only want
# the desktop client (without the relay server) can build a smaller
# binary. See `app/Cargo.toml` for the gating feature.
[dependencies]
orgii_protocol = { path = "../orgii-protocol" }

# Async runtime + HTTP / WebSocket server (already in workspace root)
tokio = { workspace = true }
axum = { workspace = true }
tower-http = { version = "0.6", features = ["cors", "timeout"] }

# Serde + JSON
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Storage (relay-local SQLite)
rusqlite = { workspace = true }

# Identifiers + crypto
uuid = { version = "1", features = ["v4"] }
rand = { workspace = true }

# async fn in traits â€” needed for the `Storage` and `Hub` abstractions
# while we still target rust-version 1.85; once we move to a newer MSRV
# we can drop this dep in favour of native async-fn-in-trait.
async-trait = "0.1"

# Errors + tracing
thiserror = { workspace = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }

# CLI subcommands (relay-only â€” kept here, not in workspace root)
clap = { version = "4", features = ["derive"] }

# CLI-level error wrapping. The `cli` module is a thin binary-only layer
# that shells out to `launchctl` / `systemctl` / `nssm`; `anyhow` keeps
# error messages contextual without growing `RelayError`.
anyhow = "1"

# Cross-platform home-dir resolution for service unit paths
# (`~/Library/LaunchAgents/...`, `~/.config/systemd/user/...`).
# Pinned to `6` to match the rest of the workspace and avoid a duplicate
# `dirs` major in the resolved Cargo.lock.
dirs = "6"

# Time
chrono = { workspace = true }

# axum 0.8 dropped the implicit `Sink::send` / `Sink::close` impls on its
# WebSocket type, so the explicit `SinkExt` trait import is required to
# call `socket.close().await` from the `ws_*` handlers.
futures-util = "0.3"

# Test-only utilities. `tower::ServiceExt::oneshot` is the canonical way
# to drive an axum `Router` without binding a TCP listener; `http-body-util`
# collects the response body bytes for assertions.
#
# `reqwest`, `tokio-tungstenite`, and `futures-util` are scoped to the
# `tests/end_to_end_smoke.rs` integration test, which boots a real
# axum server on an ephemeral TCP port and drives both the HTTP
# pairing dance and the desktop / mobile WebSockets through real
# clients. Plain `http://` and `ws://` only â€” TLS pulls in a crypto
# provider transitively, and the smoke test deliberately exercises
# the loopback path the unit tests can't reach.
[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
tempfile = "3"
reqwest = { workspace = true }
tokio-tungstenite = { workspace = true }
futures-util = "0.3"
