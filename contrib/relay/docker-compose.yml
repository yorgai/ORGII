# ORGII Mobile Remote Relay — example Docker Compose for self-hosters.
#
# Audience: self-hosters running the relay behind a TLS terminator
# (nginx, Caddy, Cloudflare Tunnel) on a single-tenant VPS.
#
# Companion deploy doc:
#   Documentation/MainApp/collaboration/mobile-remote-relay-deploy--0505.md
#
# Run from this directory:
#   cd contrib/relay
#   docker compose up -d
#   docker compose logs -f
#
# The host port binding is loopback-only (`127.0.0.1:7878:7878`). The
# Phase 2 auth model (X-User-Id header) is forgery-trivial; do NOT bind
# this to `0.0.0.0` on the host. Put nginx in front and let nginx do TLS
# + a hardcoded `proxy_set_header X-User-Id "self-host-user"`.

services:
  relay:
    build:
      # Workspace root — cargo needs the full workspace to resolve the
      # `orgii-protocol` path dependency.
      context: ../..
      dockerfile: contrib/relay/Dockerfile
    image: orgii-mobile-relay:latest
    container_name: orgii-mobile-relay
    ports:
      - "127.0.0.1:7878:7878"
    volumes:
      - relay-data:/var/lib/orgii-relay
    command:
      - "--listen-addr"
      - "0.0.0.0:7878"
      - "--storage-path"
      - "/var/lib/orgii-relay/orgii-relay.db"
    restart: unless-stopped

volumes:
  relay-data:
